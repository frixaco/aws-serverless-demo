AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Parameters:
  DataSourceRoleArn:
    Type: String
    Description: IAM role AppSync uses to invoke Lambda data sources.
  SharedLayerArn:
    Type: String
    Description: Shared Lambda layer ARN.
  MergedApiArn:
    Type: String
    Description: Merged AppSync API ARN.
  CognitoUserPoolId:
    Type: String
    Description: Cognito User Pool ID used by the demo APIs.

Globals:
  Function:
    Runtime: python3.14
    Timeout: 10
    Handler: app.lambda_handler

Resources:
  UserSourceApi:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: !Sub "${AWS::StackName}-user-source"
      ApiType: GRAPHQL
      AuthenticationType: API_KEY
      AdditionalAuthenticationProviders:
        - AuthenticationType: AMAZON_COGNITO_USER_POOLS
          UserPoolConfig:
            UserPoolId: !Ref CognitoUserPoolId
            AwsRegion: !Ref AWS::Region

  UserSourceApiKey:
    Type: AWS::AppSync::ApiKey
    Properties:
      ApiId: !GetAtt UserSourceApi.ApiId
      Description: API key for local demo calls.

  UserSchema:
    Type: AWS::AppSync::GraphQLSchema
    Properties:
      ApiId: !GetAtt UserSourceApi.ApiId
      DefinitionS3Location: ./user-api.graphql

  CurrentUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../user_profile/
      Layers:
        - !Ref SharedLayerArn

  CurrentUserDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt UserSourceApi.ApiId
      Name: CurrentUserDataSource
      Type: AWS_LAMBDA
      LambdaConfig:
        LambdaFunctionArn: !GetAtt CurrentUserFunction.Arn
      ServiceRoleArn: !Ref DataSourceRoleArn

  CurrentUserResolver:
    Type: AWS::AppSync::Resolver
    Properties:
      ApiId: !GetAtt UserSourceApi.ApiId
      TypeName: Query
      FieldName: currentUser
      DataSourceName: !GetAtt CurrentUserDataSource.Name
      Code: |
        import { util } from '@aws-appsync/utils';

        export function request(ctx) {
          return {
            operation: 'Invoke',
            payload: {
              arguments: ctx.args,
              identity: ctx.identity,
            },
          };
        }

        export function response(ctx) {
          const { error, result } = ctx;
          if (error) {
            util.appendError(error.message, error.type, result);
          }
          return result;
        }
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0

  UserSourceAssociation:
    Type: AWS::AppSync::SourceApiAssociation
    DependsOn:
      - UserSchema
    Properties:
      MergedApiIdentifier: !Ref MergedApiArn
      SourceApiIdentifier: !GetAtt UserSourceApi.Arn
      SourceApiAssociationConfig:
        MergeType: AUTO_MERGE

Outputs:
  UserSourceApiArn:
    Description: User source GraphQL API ARN.
    Value: !GetAtt UserSourceApi.Arn
