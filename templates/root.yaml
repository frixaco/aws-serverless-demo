AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Resources:
  FfmpegLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: ffmpeg-layer
      Description: Layer with ffmpeg and ffprobe binaries
      ContentUri: "s3://frixaco-lambda-layers/ffmpeg-layer.zip"
      CompatibleRuntimes:
        - python3.11

  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: shared-layer
      Description: Layer with dependencies and utilies
      ContentUri: ../shared/
      CompatibleRuntimes:
        - python3.11
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: python3.11

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service:
                - "appsync.amazonaws.com"
            Action:
              - "sts:AssumeRole"
      Policies:
        - PolicyName: "InvokeLambdaFunction"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: "Allow"
                Action:
                  - "lambda:invokeFunction"
                Resource: "*"

  MergedApiRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service:
                - "appsync.amazonaws.com"
            Action:
              - "sts:AssumeRole"

  MergedApiRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: MergedApiRolePolicy
      Roles:
        - !Ref MergedApiRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Action:
              - "appsync:*"
            Resource: "*"

  MergedApi:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: demo-merged-api-1
      ApiType: MERGED
      AuthenticationType: API_KEY
      MergedApiExecutionRoleArn: !GetAtt MergedApiRole.Arn

  MergedApi1ApiKey:
    Type: AWS::AppSync::ApiKey
    Properties:
      ApiId: !GetAtt MergedApi.ApiId
      Description: "API Key for the Demo API"

  SourceApi1:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: demo-source-api-1
      ApiType: GRAPHQL
      AuthenticationType: API_KEY

  SourceApi1Association:
    Type: AWS::AppSync::SourceApiAssociation
    Properties:
      MergedApiIdentifier: !GetAtt MergedApi.Arn
      SourceApiIdentifier: !GetAtt SourceApi1.Arn
      SourceApiAssociationConfig:
        MergeType: "AUTO_MERGE"

  SourceApi1ApiKey:
    Type: AWS::AppSync::ApiKey
    Properties:
      ApiId: !GetAtt SourceApi1.ApiId
      Description: "API Key for the Demo API"

  SourceApi1Schema:
    Type: "AWS::AppSync::GraphQLSchema"
    Properties:
      ApiId: !GetAtt SourceApi1.ApiId
      DefinitionS3Location: ./sourceApi1.graphql

  SourceApi1Stack:
    Type: "AWS::CloudFormation::Stack"
    Properties:
      TemplateURL: ./child1.yaml
      Parameters:
        LambdaExecutionRole: !GetAtt LambdaExecutionRole.Arn
        SharedLayerArn: !Ref SharedLayer
        SourceApi1ApiId: !GetAtt SourceApi1.ApiId

  SourceApi2:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: demo-source-api-2
      ApiType: GRAPHQL
      AuthenticationType: API_KEY

  SourceApi2Association:
    Type: AWS::AppSync::SourceApiAssociation
    Properties:
      MergedApiIdentifier: !GetAtt MergedApi.Arn
      SourceApiIdentifier: !GetAtt SourceApi2.Arn
      SourceApiAssociationConfig:
        MergeType: "AUTO_MERGE"

  SourceApi2ApiKey:
    Type: AWS::AppSync::ApiKey
    Properties:
      ApiId: !GetAtt SourceApi2.ApiId
      Description: "API Key for the Demo API"

  SourceApi2Schema:
    Type: "AWS::AppSync::GraphQLSchema"
    Properties:
      ApiId: !GetAtt SourceApi2.ApiId
      DefinitionS3Location: ./sourceApi2.graphql

  SourceApi2Stack:
    Type: "AWS::CloudFormation::Stack"
    Properties:
      TemplateURL: ./child2.yaml
      Parameters:
        LambdaExecutionRole: !GetAtt LambdaExecutionRole.Arn
        SharedLayerArn: !Ref SharedLayer
        FfmpegLayerArn: !Ref FfmpegLayer
        SourceApi2ApiId: !GetAtt SourceApi2.ApiId

Outputs:
  MergedApi:
    Description: AppSync Merged API
    Value: !GetAtt MergedApi.GraphQLUrl
  MergedApi1ApiKey:
    Description: API Key for authentication
    Value: !GetAtt MergedApi1ApiKey.ApiKey
