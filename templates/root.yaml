AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Parameters:
  ProjectName:
    Type: String
    Default: aws-serverless-demo
    Description: Prefix used for demo resource names.
  CognitoUserPoolId:
    Type: String
    Description: Cognito User Pool ID used by AppSync Cognito auth.

Resources:
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "${ProjectName}-shared"
      Description: Shared Python helpers used by demo Lambdas.
      ContentUri: ../shared/
      CompatibleRuntimes:
        - python3.14
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: python3.14

  NotificationsTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: !Sub "${ProjectName}-notifications"

  AppSyncLambdaInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - appsync.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: InvokeDemoLambdaDataSources
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: "*"

  MergedApiExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - appsync.amazonaws.com
            Action:
              - sts:AssumeRole

  MergedApiExecutionPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: MergedApiExecutionPolicy
      Roles:
        - !Ref MergedApiExecutionRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - appsync:SourceGraphQL
            Resource: "*"

  MergedApi:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: !Sub "${ProjectName}-merged"
      ApiType: MERGED
      AuthenticationType: AMAZON_COGNITO_USER_POOLS
      UserPoolConfig:
        UserPoolId: !Ref CognitoUserPoolId
        AwsRegion: !Ref AWS::Region
        DefaultAction: ALLOW
      AdditionalAuthenticationProviders:
        - AuthenticationType: API_KEY
      MergedApiExecutionRoleArn: !GetAtt MergedApiExecutionRole.Arn

  MergedApiKey:
    Type: AWS::AppSync::ApiKey
    Properties:
      ApiId: !GetAtt MergedApi.ApiId
      Description: API key for local demo calls.

  UserApiStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./user-api.yaml
      Parameters:
        DataSourceRoleArn: !GetAtt AppSyncLambdaInvokeRole.Arn
        SharedLayerArn: !Ref SharedLayer
        MergedApiArn: !GetAtt MergedApi.Arn
        CognitoUserPoolId: !Ref CognitoUserPoolId

  WorkflowApiStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./workflow-api.yaml
      Parameters:
        DataSourceRoleArn: !GetAtt AppSyncLambdaInvokeRole.Arn
        SharedLayerArn: !Ref SharedLayer
        MergedApiArn: !GetAtt MergedApi.Arn
        CognitoUserPoolId: !Ref CognitoUserPoolId
        NotificationsTopicArn: !Ref NotificationsTopic

  NotificationDispatcherStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./notification-dispatcher.yaml
      Parameters:
        SharedLayerArn: !Ref SharedLayer
        MergedApiUrl: !GetAtt MergedApi.GraphQLUrl
        MergedApiKey: !GetAtt MergedApiKey.ApiKey
        NotificationsTopicArn: !Ref NotificationsTopic

Outputs:
  MergedApiUrl:
    Description: Client-facing merged AppSync API URL.
    Value: !GetAtt MergedApi.GraphQLUrl
  MergedApiKey:
    Description: API key for local demo calls.
    Value: !GetAtt MergedApiKey.ApiKey
  NotificationsTopicArn:
    Description: SNS topic that starts the notification fanout path.
    Value: !Ref NotificationsTopic
